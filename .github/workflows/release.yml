name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish Linux release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Cache Cargo files
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            release-${{ runner.os }}-

      - name: Validate tag version
        shell: bash
        run: |
          crate_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "pulse") | .version')"
          expected_tag="v${crate_version}"
          if [[ "${GITHUB_REF_NAME}" != "${expected_tag}" ]]; then
            echo "标签 ${GITHUB_REF_NAME} 与 Cargo.toml 版本 ${crate_version} 不一致" >&2
            exit 1
          fi

      - name: Run quality checks
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --yes shellcheck
          fi
          REQUIRE_SHELLCHECK=1 make check

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package release
        shell: bash
        run: |
          target="x86_64-unknown-linux-gnu"
          package="pulse-${GITHUB_REF_NAME}-${target}"
          archive="pulse-${target}.tar.gz"
          mkdir -p "dist/${package}/config" "dist/${package}/packaging"
          install -m755 target/release/pulse "dist/${package}/pulse"
          install -m644 README.md LICENSE "dist/${package}/"
          install -m644 config/pulse.toml "dist/${package}/config/"
          install -m644 packaging/pulse.service "dist/${package}/packaging/"
          tar -C dist -czf "dist/${archive}" "${package}"
          install -m755 scripts/install.sh dist/install.sh
          rm -rf "dist/${package}"
          (
            cd dist
            sha256sum "${archive}" install.sh > SHA256SUMS
            sha256sum --check SHA256SUMS
            tar -tzf "${archive}" | grep -Fx "${package}/pulse" >/dev/null
          )

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          prerelease=()
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            prerelease+=(--prerelease)
          fi
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --verify-tag \
            --generate-notes \
            --title "Pulse ${GITHUB_REF_NAME}" \
            "${prerelease[@]}"

  docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: release
    timeout-minutes: 60

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase repository name
        id: repo
        shell: bash
        run: echo "value=${GITHUB_REPOSITORY,,}" >>"${GITHUB_OUTPUT}"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo.outputs.value }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
